name: wildberries-mcp
description: Wildberries Seller API MCP server. 15 tools. Products, orders, stocks, ABC analysis, feedbacks. Production-grade rate limiting.
version: 0.3.3

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      WB_API_TOKEN:
        type: string
        description: "Wildberries Seller API token (JWT, 180-day validity). Get at https://seller.wildberries.ru/supplier-settings/access-to-api"
    required:
      - WB_API_TOKEN
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@theyahia/wildberries-mcp"],
      env: {
        WB_API_TOKEN: config.WB_API_TOKEN
      }
    })
